          format: date-time
        source:
          type: string
        data:
          type: object
          additionalProperties: false
          required: [alertId, alertType, severity, timestamp]
          properties:
            alertId:
              type: string
              format: uuid
            alertType:
              type: string
              example: UNAUTHORIZED_ACCESS
            severity:
              type: string
              enum: [low, medium, high, critical]
              example: high
            timestamp:
              type: string
              format: date-time
            policyId:
              type: string
            decisionId:
              type: string
              format: uuid
            subjectId:
              type: string
            message:
              type: string
              example: High warning detection at main campus gate

    AlertResolvedEvent:
      type: object
      additionalProperties: false
