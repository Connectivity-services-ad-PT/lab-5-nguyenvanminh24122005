              type: string
              example: POLICY-001
            subjectId:
              type: string
              example: RFID-2026-001
            result:
              type: string
              enum: [allow, deny]
              example: deny
            reasonCode:
              type: string
              enum: [allowed, invalid_subject, permission_denied, outside_schedule, policy_not_found, policy_expired, system_error, unknown]
